name: Catalog Service CI

on:
  push:
    paths:
      - 'catalog-service/**'
    branches:
      - '**'

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    env:
      working-directory: ./catalog-service
    defaults:
      run:
        working-directory: ${{env.working-directory}}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'oracle' # Oracle is usually the first to provide JDK 25 binaries
          cache: 'maven'

      - name: Build and Test
        # We run from root but focus only on catalog-service using -pl
        # -am ensures parent/dependencies are included
        run: mvn clean verify -pl catalog-service -am -Dspotless.check.skip=false

      - name: Spotless Check
        # This confirms formatting was applied correctly
        run: mvn spotless:check -pl catalog-service


