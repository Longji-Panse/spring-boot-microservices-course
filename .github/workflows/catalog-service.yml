name: Catalog Service CI

on:
  push:
    paths:
      - 'catalog-service/**'
      - 'pom.xml'
  pull_request:
    paths:
      - 'catalog-service/**'
      - 'pom.xml'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'oracle'
          cache: 'maven'

      - name: Build and Test
        run: |
          ./mvnw clean verify -pl catalog-service -am -Dspotless.check.skip=false

      - name: Spotless Check
        run: ./mvnw spotless:check -pl catalog-service